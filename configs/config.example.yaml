server:
  http_addr: ":8080"
  grpc_addr: ":9090"

database:
  dsn: "postgres://cyandie:cyandie@localhost:5432/cyandie?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

cache:
  addr: "localhost:6379"
  password: ""
  db: 0

logger:
  level: "info"
  format: "json"

auth:
  jwt_keys:
    - kid: "key-2026-05"
      secret: "${JWT_SECRET_CURRENT}"

rate_limit:
  auth:
    limit: 10
    window: "1m"
  write:
    limit: 30
    window: "1m"
  read:
    limit: 60
    window: "1m"

timeout:
  default: "30s"
