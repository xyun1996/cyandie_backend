syntax = "proto3";
package chat.v1;
option go_package = "github.com/cyandie/backend/api/proto/chat/v1;chatv1";

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  AUTH = 1;
  AUTH_OK = 2;
  AUTH_REJECTED = 3;
  HEARTBEAT = 16;
  HEARTBEAT_ACK = 17;
  JOIN_ROOM = 256;
  JOIN_ROOM_OK = 257;
  LEAVE_ROOM = 258;
  LEAVE_ROOM_OK = 259;
  SEND_MSG = 272;
  RECV_MSG = 273;
  MSG_REJECTED = 274;
  ERROR = 65535;
}

message AuthRequest { string access_token = 1; }
message AuthResponse { string user_id = 1; string session_id = 2; }
message Heartbeat {}
message HeartbeatAck {}
message JoinRoomRequest { string room_id = 1; }
message JoinRoomResponse { string room_id = 1; }
message LeaveRoomRequest { string room_id = 1; }
message LeaveRoomResponse { string room_id = 1; }
message SendMessageRequest { string room_id = 1; string content = 2; string type = 3; }
message ReceiveMessage { string room_id = 1; string sender_id = 2; string content = 3; string type = 4; int64 timestamp = 5; string message_id = 6; }
message ErrorMessage { string code = 1; string message = 2; }

message ChatEnvelope {
  MessageType type = 1;
  uint32 sequence = 2;
  oneof payload {
    AuthRequest auth_request = 10;
    AuthResponse auth_response = 11;
    Heartbeat heartbeat = 12;
    HeartbeatAck heartbeat_ack = 13;
    JoinRoomRequest join_room_request = 20;
    JoinRoomResponse join_room_response = 21;
    LeaveRoomRequest leave_room_request = 22;
    LeaveRoomResponse leave_room_response = 23;
    SendMessageRequest send_message_request = 30;
    ReceiveMessage receive_message = 31;
    ErrorMessage error = 50;
  }
}
